<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UperAI — Launching July 29, 2026</title>
  <meta name="description" content="UperAI officially launching for the public on July 29, 2026.">
  <meta name="theme-color" content="#060810">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="UperAI — Public Launch July 29, 2026">
  <meta property="og:description" content="UperAI is officially launching for the public on July 29, 2026.">

  <!-- Fonts: Orbitron & Space Grotesk -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-dark: #060810;
      --cyan-glow: #00f2fe;
      --indigo-glow: #6100ff;
      --text-main: #f8fafc;
      --text-muted: rgba(248, 250, 252, 0.6);
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
      --font-heading: 'Orbitron', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-body: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: var(--bg-dark);
      color: var(--text-main);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Professional, subtle ambient dark radial background gradient */
    .bg-gradient {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: 
        radial-gradient(circle at 50% 40%, rgba(97, 0, 255, 0.14) 0%, rgba(0, 242, 254, 0.07) 35%, transparent 70%),
        radial-gradient(circle at 50% 100%, rgba(6, 8, 16, 1) 0%, rgba(4, 5, 11, 1) 100%);
      z-index: 1;
      pointer-events: none;
    }

    /* Subtle grid accent */
    .grid-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(to right, rgba(255, 255, 255, 0.015) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
      background-size: 70px 70px;
      z-index: 2;
      pointer-events: none;
      mask-image: radial-gradient(circle at 50% 45%, rgba(0,0,0,1) 20%, rgba(0,0,0,0) 75%);
      -webkit-mask-image: radial-gradient(circle at 50% 45%, rgba(0,0,0,1) 20%, rgba(0,0,0,0) 75%);
    }

    /* Main Viewport Container */
    .main-viewport {
      position: relative;
      z-index: 10;
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 2.5rem 1.5rem;
    }

    /* Hero Center Stage */
    .hero-stage {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      max-width: 900px;
    }

    /* Ambient backdrop glow behind logo */
    .logo-halo {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 500px;
      height: 240px;
      background: radial-gradient(ellipse at center, rgba(0, 242, 254, 0.22) 0%, rgba(97, 0, 255, 0.15) 50%, transparent 75%);
      filter: blur(55px);
      border-radius: 50%;
      z-index: -1;
      pointer-events: none;
    }

    /* Status Badge: COMING SOON */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 22px;
      border-radius: 100px;
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(0, 242, 254, 0.22);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
      margin-bottom: 2rem;
    }

    .status-dot-wrapper {
      position: relative;
      width: 8px;
      height: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .status-dot-core {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--cyan-glow);
      box-shadow: 0 0 10px var(--cyan-glow);
    }

    .status-dot-ring {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 1.5px solid var(--cyan-glow);
      transform: translate(-50%, -50%);
      animation: pulseRing 2.2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
    }

    @keyframes pulseRing {
      0% { transform: translate(-50%, -50%) scale(1); opacity: 0.9; }
      70% { transform: translate(-50%, -50%) scale(3.2); opacity: 0; }
      100% { transform: translate(-50%, -50%) scale(3.2); opacity: 0; }
    }

    .status-text {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.95);
    }

    /* Main Futuristic Orbitron Logo Typography */
    .logo-typography {
      font-family: var(--font-heading);
      font-size: clamp(3.5rem, 11vw, 7.5rem);
      font-weight: 900;
      line-height: 1;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      
      background: linear-gradient(
        135deg,
        #ffffff 0%,
        #00f2fe 35%,
        #4facfe 65%,
        #6100ff 100%
      );
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;

      filter: drop-shadow(0 0 35px rgba(0, 242, 254, 0.3));
      user-select: none;
      margin-bottom: 2.25rem;
    }

    /* Launch Date Badge Element */
    .launch-card {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 12px 28px;
      border-radius: 100px;
      background: rgba(255, 255, 255, 0.025);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      transition: border-color 0.3s ease;
    }

    .launch-card:hover {
      border-color: rgba(0, 242, 254, 0.3);
    }

    .launch-icon {
      color: var(--cyan-glow);
      display: flex;
      align-items: center;
    }

    .launch-text {
      font-size: clamp(0.875rem, 2vw, 1rem);
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.02em;
    }

    .launch-date {
      color: #ffffff;
      font-weight: 700;
      background: linear-gradient(90deg, #ffffff, var(--cyan-glow));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    @media (max-width: 640px) {
      .main-viewport {
        padding: 1.75rem 1rem;
      }
      .launch-card {
        padding: 10px 20px;
      }
    }
  </style>
</head>
<body>

  <!-- Clean Background Gradient -->
  <div class="bg-gradient"></div>

  <!-- Grid Accent Overlay -->
  <div class="grid-overlay"></div>

  <!-- Main Viewport Layer -->
  <div class="main-viewport">
    
    <!-- Center Hero Stage -->
    <main class="hero-stage">
      
      <!-- Halo Glow -->
      <div class="logo-halo"></div>

      <!-- Status Badge -->
      <div class="status-badge">
        <div class="status-dot-wrapper">
          <div class="status-dot-core"></div>
          <div class="status-dot-ring"></div>
        </div>
        <span class="status-text">COMING SOON</span>
      </div>

      <!-- Main Logo Title (Updated Orbitron Font) -->
      <h1 class="logo-typography">UPER AI</h1>

      <!-- Public Launch Date Indicator -->
      <div class="launch-card">
        <span class="launch-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="16" y1="2" x2="16" y2="6"></line>
            <line x1="8" y1="2" x2="8" y2="6"></line>
            <line x1="3" y1="10" x2="21" y2="10"></line>
          </svg>
        </span>
        <span class="launch-text">Officially launching for the public on <span class="launch-date">July 29, 2026</span></span>
      </div>

    </main>

  </div>

</body>
</html>
